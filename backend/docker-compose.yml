
services:
  db:
    image: postgres:17
    container_name: fibrosync_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fibrosync_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fibrosync_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - fibrosync_postgres_data:/var/lib/postgresql/data

volumes:
  fibrosync_postgres_data:
